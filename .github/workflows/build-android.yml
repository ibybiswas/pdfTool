name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GRADLE_CACHE: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
  uses: actions/setup-java@v4
  with:
    java-version: 17
    distribution: temurin
    cache: gradle

      - name: Decode keystore
        env:
          KEYSTORE_ENCODED: ${{ secrets.KEYSTORE_ENCODED }}
        run: |
          echo "$KEYSTORE_ENCODED" | base64 -d > ${{ runner.temp }}/keystore.jks
          ls -la ${{ runner.temp }}/keystore.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: ./android
        run: |
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew clean assembleRelease \
              -Pandroid.injected.signing.store.file=${{ env.KEYSTORE_PATH }} \
              -Pandroid.injected.signing.store.password=${{ env.KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ env.KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ env.KEY_PASSWORD }} \
              --no-daemon
          else
            echo "./gradlew not found in android/, installing Gradle and using system gradle"
            sudo apt-get update && sudo apt-get install -y wget unzip
            wget https://services.gradle.org/distributions/gradle-8.2-bin.zip -P /tmp
            unzip -q /tmp/gradle-8.2-bin.zip -d /tmp
            export GRADLE_HOME=/tmp/gradle-8.2
            export PATH="$GRADLE_HOME/bin:$PATH"
            /tmp/gradle-8.2/bin/gradle clean assembleRelease \
              -Pandroid.injected.signing.store.file=${{ env.KEYSTORE_PATH }} \
              -Pandroid.injected.signing.store.password=${{ env.KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ env.KEY_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ env.KEY_PASSWORD }} \
              --no-daemon
          fi

      - name: Find and rename APK
        working-directory: ./android
        run: |
          APK_PATH=$(find ./app/build/outputs/apk -name "*.apk" -type f)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "Found APK at: $APK_PATH"
          ls -lh "$APK_PATH"

      - name: Get release tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: PDF Chef Android ${{ steps.tag.outputs.version }}
          body: |
            ## PDF Chef Android Release ${{ steps.tag.outputs.version }}
            
            **Compatibility:** Android 11+ (API 30+)
            
            ### Changes
            - Build timestamp: ${{ github.event.head_commit.timestamp }}
            - Commit: ${{ github.event.head_commit.id }}
            
            ### Installation
            1. Download the APK file from the assets below
            2. Enable "Unknown Sources" in your Android settings
            3. Install the APK on your Android device
            
            **Note:** This app requires internet access to function.
          draft: false
          prerelease: false

      - name: Upload APK to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.APK_PATH }}
          asset_name: pdf-chef-${{ steps.tag.outputs.version }}.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdf-chef-apk
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Build success notification
        run: |
          echo "✅ Android APK build and release completed successfully!"
          echo "APK: pdf-chef-${{ steps.tag.outputs.version }}.apk"
          echo "Release: ${{ steps.create_release.outputs.html_url }}"
